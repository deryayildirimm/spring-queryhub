services:
  postgres:
    image: postgres:16-alpine
    container_name: queryhub-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB : ${POSTGRES_DB}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - queryhub_pgdata:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: queryhub-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - queryhub_esdata:/usr/share/elasticsearch/data

  app:
   build:  .
   container_name: queryhub-app
   depends_on:
     - postgres
     - elasticsearch
   env_file:
     - .env
   environment:
     APP_PORT: ${APP_PORT}
     POSTGRES_HOST: postgres
     POSTGRES_PORT_INTERNAL: 5432
     POSTGRES_DB: ${POSTGRES_DB}
     POSTGRES_USER: ${POSTGRES_USER}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
     ELASTICSEARCH_URI: http://elasticsearch:9200
   ports:
    - "${APP_PORT}:8080"

volumes:
  queryhub_pgdata:
  queryhub_esdata:
